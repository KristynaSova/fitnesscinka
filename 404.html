<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stránka nenalezena | Fitnessčinka</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="Obrazky/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Obrazky/icons/favicon-16x16.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }

        .error-page__inner {
            max-width: 520px;
        }

        .error-page__code {
            font-family: var(--font-heading);
            font-size: clamp(6rem, 20vw, 10rem);
            line-height: 1;
            background: linear-gradient(135deg, rgb(249, 6, 18), rgb(244, 106, 37));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .error-page__title {
            font-size: clamp(1.4rem, 4vw, 2rem);
            margin-bottom: 16px;
        }

        .error-page__desc {
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.7;
            text-align: center;
        }

        .error-page__actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <div class="error-page">
        <div class="error-page__inner">
            <div class="error-page__code">404</div>
            <h1 class="error-page__title">Stránka nenalezena</h1>
            <p class="error-page__desc">
                Stránka, kterou hledáte, neexistuje nebo byla přesunuta.<br>
                Vraťte se na hlavní stránku a pokračujte dál.
            </p>
            <div class="error-page__actions">
                <a href="/" class="btn btn--primary">
                    <i class="fa-solid fa-house"></i> Zpět na hlavní stránku
                </a>
                <a href="/koupit.html" class="btn btn--secondary">
                    Objednat činku
                </a>
            </div>
        </div>
    </div>

</body>

</html>
